services:
  - type: web
    name: automotive-buddy-api
    runtime: python
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: PIP_ONLY_BINARY
        value: ":all:"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  - type: web
    name: automotive-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    branch: main
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
