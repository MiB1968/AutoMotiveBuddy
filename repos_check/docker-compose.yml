version: "3"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # - GEMINI_API_KEY=your_key_here
      - DB_HOST=db
      - DB_USER=user
      - DB_PASS=pass
      - DB_NAME=automotive
    depends_on:
      - db
      
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: automotive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
